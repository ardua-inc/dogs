version: '3.8'

services:
  web:
    image: ghcr.io/ardua-inc/dogs:latest
    container_name: dogs-web
    restart: unless-stopped
    env_file: .env
    ports:
      - "8001:8000"
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/login"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  backup:
    image: rclone/rclone:latest
    container_name: dogs-backup
    restart: unless-stopped
    volumes:
      - ./data:/data:ro
      - ./rclone:/config/rclone:ro
    environment:
      - TZ=America/Los_Angeles
    entrypoint: /bin/sh
    command:
      - -c
      - |
        echo "Starting backup scheduler..."
        while true; do
          echo "[$(date)] Running backup..."
          rclone sync /data ${RCLONE_REMOTE}:${S3_BUCKET}/dogs --config /config/rclone/rclone.conf
          echo "[$(date)] Backup complete. Sleeping 6 hours..."
          sleep 21600
        done
