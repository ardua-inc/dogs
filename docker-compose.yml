services:
  web:
    image: ghcr.io/jimatardua/dogs:latest
    env_file:
      - .env
    depends_on:
      db:
        condition: service_started
      db-backup:
        condition: service_started
      photos-backup:
        condition: service_started
    volumes:
      - uploads_volume:/app/uploads
    ports:
      - "8000:8000"
    restart: unless-stopped

  db:
    image: postgres:15
    env_file:
      - .env
    volumes:
      - db_data:/var/lib/postgresql/data
    restart: unless-stopped

  db-backup:
    image: prodrigestivill/postgres-backup-local
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      SCHEDULE: "@daily"
      BACKUP_KEEP_DAYS: 14
      BACKUP_KEEP_WEEKS: 4
      BACKUP_KEEP_MONTHS: 3
      BACKUP_SUFFIX: .dump
    volumes:
      - pg_backups:/backups
    depends_on:
      - db
    restart: unless-stopped

  db-backup-upload:
    image: rclone/rclone:latest
    env_file:
      - .env.backup
    entrypoint: ["rclone"]
    command:
      - sync
      - /backups
      - s3:dogs-app-backups/postgres
      - --config
      - /config/rclone/rclone.conf
      - --checksum
      - --verbose
    volumes:
      - pg_backups:/backups:ro
      - ./rclone:/config/rclone
    restart: "no"

  photos-backup:
    image: rclone/rclone:latest
    env_file:
      - .env.backup
    entrypoint: ["rclone"]
    command:
      - sync
      - /data/uploads
      - s3:dogs-app-backups/uploads
      - --config
      - /config/rclone/rclone.conf
      - --checksum
      - --verbose
    volumes:
      - uploads_volume:/data/uploads:ro
      - ./rclone:/config/rclone
    restart: "no"

volumes:
  db_data:
  uploads_volume:
  pg_backups:
