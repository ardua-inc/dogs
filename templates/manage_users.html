{% extends "base.html" %}
{% block content %}
<h2>Manage Users</h2>
<a href="{{ url_for('register') }}" class="btn">Add New User</a>
<table>
    <tr>
        <th>Username</th>
        <th>Role</th>
        <th>Full Name</th>
        <th>Email</th>
        <th>Active</th>
        <th>Actions</th>
    </tr>
    {% for user in users %}
    <tr>
        <td>{{ user.username }}</td>
        <td>{{ user.role }}</td>
        <td>{{ user.full_name or '' }}</td>
        <td>{{ user.email or '' }}</td>
        <td>{{ 'Yes' if user.is_active else 'No' }}</td>
        <td>
            <form method="POST">
                <input type="hidden" name="user_id" value="{{ user.id }}">
                <input type="text" name="username" value="{{ user.username }}">
                <select name="role">
                    <option value="admin" {{ 'selected' if user.role == 'admin' else '' }}>Admin</option>
                    <option value="doctor" {{ 'selected' if user.role == 'doctor' else '' }}>Doctor</option>
                    <option value="user" {{ 'selected' if user.role == 'user' else '' }}>User</option>
                    <option value="viewer" {{ 'selected' if user.role == 'viewer' else '' }}>Viewer</option>
                </select>
                <input type="text" name="full_name" value="{{ user.full_name or '' }}">
                <input type="email" name="email" value="{{ user.email or '' }}">
                <input type="checkbox" name="is_active" {{ 'checked' if user.is_active else '' }}>
                <button type="submit" name="action" value="edit">Edit</button>
                <button type="submit" name="action" value="delete">Delete</button>
            </form>
        </td>
    </tr>
    {% endfor %}
</table>
{% endblock %}
