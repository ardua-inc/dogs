{% extends "base.html" %}
{% block content %}
<h2>Edit Medical Record for Dog ID: {{ dog_id }}</h2>
<form method="POST" enctype="multipart/form-data">
    <label for="record">Replace File (optional):</label>
    <input type="file" id="record" name="record" accept=".txt,.pdf,.png,.jpg,.jpeg">
    <label for="description">Description:</label>
    <input type="text" id="description" name="description" value="{{ record.description or '' }}" placeholder="Description">
    <label for="category">Category:</label>
    <select id="category" name="category">
        <option value="Vaccination Certificate" {% if record.category == 'Vaccination Certificate' %}selected{% endif %}>Vaccination Certificate</option>
        <option value="Visit Invoice" {% if record.category == 'Visit Invoice' %}selected{% endif %}>Visit Invoice</option>
        <option value="Prescription" {% if record.category == 'Prescription' %}selected{% endif %}>Prescription</option>
        <option value="Visit Notes" {% if record.category == 'Visit Notes' %}selected{% endif %}>Visit Notes</option>
        <option value="Lab Results" {% if record.category == 'Lab Results' %}selected{% endif %}>Lab Results</option>
        <option value="X-Ray" {% if record.category == 'X-Ray' %}selected{% endif %}>X-Ray</option>
        <option value="Surgery Report" {% if record.category == 'Surgery Report' %}selected{% endif %}>Surgery Report</option>
        <option value="Dental Records" {% if record.category == 'Dental Records' %}selected{% endif %}>Dental Records</option>
        <option value="Allergy Test" {% if record.category == 'Allergy Test' %}selected{% endif %}>Allergy Test</option>
        <option value="Other" {% if record.category == 'Other' %}selected{% endif %}>Other</option>
    </select>
    <label for="record_date">Record Date:</label>
    <input type="date" id="record_date" name="record_date" value="{{ record.record_date or '' }}">
    <button type="submit">Update Record</button>
</form>
<a href="{{ url_for('edit_dog', dog_id=dog_id) }}" class="btn">Cancel</a>
{% endblock %}
